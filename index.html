<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Bulls Eye — Wheel Desk</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  :root{ --ink:#17191C; --paper:#EFF1ED; --card:#FFFFFF; --gold:#C9921F; --red:#BF1B2C; --blue:#2B4C6F; --deep:#1B2733; --line:#D8DBD4; --dim:#6B7069; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: 'IBM Plex Mono', ui-monospace, monospace; -webkit-text-size-adjust: 100%; }
  input, button, select { font-family: 'IBM Plex Mono', monospace; }
  input[type=range]{ -webkit-appearance:none; appearance:none; width:100%; height:2px; background:var(--line); border-radius:2px; outline:none; margin:6px 0; }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; appearance:none; width:18px; height:18px; border-radius:50%; background:var(--ink); border:3px solid var(--paper); box-shadow:0 0 0 1.5px var(--ink); cursor:pointer; }
  input[type=range]::-moz-range-thumb{ width:16px; height:16px; border-radius:50%; background:var(--ink); border:3px solid var(--paper); box-shadow:0 0 0 1.5px var(--ink); cursor:pointer; }
  input[type=range]:focus-visible::-webkit-slider-thumb{ box-shadow:0 0 0 2.5px var(--red); }
  .num-in{ font-family:'IBM Plex Mono',monospace; font-weight:600; }
  .num-in:focus{ outline:2px solid var(--red); outline-offset:1px; }
  .card{ background:var(--card); border:1.5px solid var(--line); border-radius:10px; padding:14px; margin-bottom:16px; }
  .card-ink{ border-color:var(--ink); }
  .grp{ font-size:11px; letter-spacing:.12em; color:var(--dim); margin-bottom:10px; }
  button{ transition: all .15s; }
  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
(function () {
  // ---------------- design tokens ----------------
  var C = { ink:"#17191C", paper:"#EFF1ED", card:"#FFFFFF", gold:"#C9921F", red:"#BF1B2C", blue:"#2B4C6F", deep:"#1B2733", line:"#D8DBD4", dim:"#6B7069" };
  var ARCHIVO = "'Archivo', sans-serif";

  // ---------------- helpers ----------------
  function fmtMoney(n){ if(!isFinite(n)) return "—"; var a=Math.abs(n); if(a>=1e6) return "$"+(n/1e6).toFixed(2).replace(/\.00$/,"")+"M"; if(a>=1e3) return "$"+(n/1e3).toFixed(1).replace(/\.0$/,"")+"k"; return "$"+Math.round(n).toLocaleString(); }
  function fmtMoneyFull(n){ return !isFinite(n)?"—":"$"+Math.round(n).toLocaleString(); }
  function fmtBig(n){ if(!isFinite(n)) return "—"; var a=Math.abs(n); if(a>=1e12) return "$"+(n/1e12).toFixed(2)+"T"; if(a>=1e9) return "$"+(n/1e9).toFixed(2)+"B"; if(a>=1e6) return "$"+(n/1e6).toFixed(1)+"M"; return "$"+Math.round(n).toLocaleString(); }
  function fmtPct(n,d){ if(d==null)d=2; return !isFinite(n)?"—":n.toFixed(d)+"%"; }
  function num(v){ var n=parseFloat(v); return isFinite(n)?n:0; }
  function isN(x){ return typeof x==="number" && isFinite(x); }
  function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function row(dot,label,value){ return '<div style="display:flex;align-items:center;gap:8px;padding:3.5px 0"><span style="width:8px;height:8px;border-radius:50%;background:'+dot+';flex-shrink:0"></span><span style="flex:1;color:#454A44">'+label+'</span><span style="font-weight:600;white-space:nowrap">'+value+'</span></div>'; }
  var store = {
    get:function(k,fb){ try{ var v=window.localStorage.getItem(k); return v?JSON.parse(v):fb; }catch(e){ return fb; } },
    set:function(k,v){ try{ window.localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
  };

  // ==================================================================
  // CALCULATOR
  // ==================================================================
  var PRESETS = {
    safe:{ label:"Safe", weeklyPct:0.25, breachRate:30, rollRate:0, rollEff:65, rollMonths:1.5, deepPct:100, lockShallow:6, lockDeep:18, yieldShallow:4, yieldDeep:1, slotSize:30000, posCap:5 },
    realistic:{ label:"Realistic", weeklyPct:0.25, breachRate:30, rollRate:60, rollEff:65, rollMonths:1.5, deepPct:15, lockShallow:3, lockDeep:20, yieldShallow:4, yieldDeep:1, slotSize:30000, posCap:5 },
    aggressive:{ label:"Aggressive", weeklyPct:0.45, breachRate:45, rollRate:70, rollEff:60, rollMonths:1.5, deepPct:25, lockShallow:3, lockDeep:24, yieldShallow:4, yieldDeep:1, slotSize:30000, posCap:7 }
  };
  var GROUPS = [
    { title:"PREMIUM", fields:[
      { key:"weeklyPct", label:"Premium per week", sub:"% of deployed (higher = higher delta / IV)", min:0.05, max:1, step:0.01, unit:"%" },
      { key:"breachRate", label:"Breach rate", sub:"% of positions ITM per monthly cycle", min:0, max:100, step:1, unit:"%" } ] },
    { title:"ROLLING", fields:[
      { key:"rollRate", label:"Breaches rolled", sub:"% of breaches rolled instead of assigned", min:0, max:100, step:5, unit:"%" },
      { key:"rollEff", label:"Rolled premium efficiency", sub:"% of normal weekly premium while rolling", min:20, max:100, step:5, unit:"%" },
      { key:"rollMonths", label:"Avg roll duration", sub:"extra months a rolled campaign runs", min:0.5, max:6, step:0.5, unit:"mo" } ] },
    { title:"ASSIGNMENTS — TWO COHORTS", fields:[
      { key:"deepPct", label:"Deep assignments", sub:"% of assignments far underwater", min:0, max:100, step:5, unit:"%" },
      { key:"lockShallow", label:"Shallow recovery", sub:"months locked, near basis", min:0.5, max:24, step:0.5, unit:"mo" },
      { key:"lockDeep", label:"Deep recovery", sub:"months locked, far underwater", min:1, max:60, step:1, unit:"mo" },
      { key:"yieldShallow", label:"Shallow locked yield", sub:"%/yr — calls near basis + dividends", min:0, max:12, step:0.5, unit:"%" },
      { key:"yieldDeep", label:"Deep locked yield", sub:"%/yr — dividends + scraps", min:0, max:8, step:0.5, unit:"%" } ] },
    { title:"PACKAGING", fields:[
      { key:"slotSize", label:"Slot size", sub:"collateral per position", min:5000, max:100000, step:1000, unit:"$" },
      { key:"posCap", label:"Position cap", sub:"max % of account per position", min:1, max:20, step:0.5, unit:"%" } ] }
  ];

  function calcCompute(s){
    var weeklyPct=num(s.weeklyPct), breach=num(s.breachRate)/100, rollRate=num(s.rollRate)/100, rollEff=num(s.rollEff)/100, rollMonths=num(s.rollMonths);
    var deep=num(s.deepPct)/100, Ls=num(s.lockShallow), Ld=num(s.lockDeep), rS=num(s.yieldShallow)/100, rD=num(s.yieldDeep)/100, slotSize=num(s.slotSize), posCap=num(s.posCap);
    var fRoll=Math.min(0.9, breach*rollRate*rollMonths);
    var premiumFactor=(1-fRoll)+fRoll*rollEff;
    var rAGross=(weeklyPct/100)*52;
    var rA=rAGross*premiumFactor;
    var a=breach*(1-rollRate);
    var Ms=a*(1-deep)*Ls, Md=a*deep*Ld, M=Ms+Md;
    var lockedCoef=Ms*rS+Md*rD;
    var y=(rA+lockedCoef)/(1+M);
    var total, income;
    if(s.mode==="income"){ income=num(s.targetIncome); total=y>0?income/y:Infinity; }
    else { total=num(s.accountSize); income=total*y; }
    var active=total/(1+M), lockedS=Ms*active, lockedD=Md*active, premiumIncome=active*rA;
    var weekly=income/52, perSlot=slotSize*(1+M), stage1=perSlot, stage2=2*perSlot;
    var stage3=posCap>0?slotSize/(posCap/100):Infinity;
    var slotsAtStage3=perSlot>0?Math.max(1,Math.floor(stage3/perSlot)):0;
    var slotsNow=slotSize>0?Math.floor(active/slotSize):0;
    var posPctNow=total>0?(slotSize/total)*100:0;
    return { rAGross:rAGross, rA:rA, fRoll:fRoll, a:a, M:M, Ms:Ms, Md:Md, y:y, total:total, income:income, active:active, lockedS:lockedS, lockedD:lockedD, premiumIncome:premiumIncome, weekly:weekly, perSlot:perSlot, stage1:stage1, stage2:stage2, stage3:stage3, slotsAtStage3:slotsAtStage3, slotsNow:slotsNow, posPctNow:posPctNow, slotSize:slotSize, posCap:posCap };
  }
  function projCompute(c,s){
    var y=c.y, start=num(s.startAccount), contrib=num(s.weeklyContrib), years=Math.max(0,Math.min(50,num(s.projYears))), weeks=Math.round(years*52);
    var rw=Math.pow(1+Math.max(y,-0.99),1/52)-1, bal=start, series=[bal];
    for(var w=1;w<=weeks;w++){ bal=bal*(1+rw)+contrib; if(w%52===0) series.push(bal); }
    var end=bal, contributed=start+contrib*weeks, growth=end-contributed, endIncome=end*y, crossYear=null;
    for(var i=0;i<series.length;i++){ if(series[i]>=c.stage3){ crossYear=i; break; } }
    return { end:end, contributed:contributed, growth:growth, endIncome:endIncome, series:series, crossYear:crossYear, years:years };
  }

  function headlineHTML(s,c){
    var R=78, t=c.total;
    var rAct=t>0?Math.sqrt(c.active/t)*R:0, rActS=t>0?Math.sqrt((c.active+c.lockedS)/t)*R:0;
    var rings='<svg width="120" height="120" viewBox="0 0 170 170" style="flex-shrink:0" role="img" aria-label="Capital structure rings">'+
      '<circle cx="85" cy="85" r="'+R+'" fill="'+C.deep+'"/>'+
      '<circle cx="85" cy="85" r="'+rActS+'" fill="'+C.blue+'"/>'+
      '<circle cx="85" cy="85" r="'+rAct+'" fill="'+C.gold+'"/>'+
      '<circle cx="85" cy="85" r="'+R+'" fill="none" stroke="'+C.ink+'" stroke-width="2"/>'+
      '<circle cx="85" cy="85" r="2.5" fill="'+C.red+'"/></svg>';
    var big = s.mode==="income"?fmtMoney(c.total):fmtMoney(c.income);
    var sub = s.mode==="income" ? (fmtMoneyFull(c.income)+" / yr · "+fmtMoney(c.weekly)+" / wk") : (fmtMoney(c.weekly)+" / wk · on "+fmtMoney(c.total));
    var out = '<div style="display:flex;align-items:center;gap:16px">'+rings+
      '<div style="flex:1">'+
      '<div style="font-size:10.5px;color:'+C.dim+';letter-spacing:.12em">'+(s.mode==="income"?"TOTAL ACCOUNT NEEDED":"YEARLY INCOME")+'</div>'+
      '<div style="font-family:'+ARCHIVO+';font-weight:800;font-size:34px;letter-spacing:-.02em;line-height:1.1;color:'+C.red+'">'+big+'</div>'+
      '<div style="font-size:11.5px;color:'+C.dim+';margin-top:4px">'+sub+'</div>'+
      '<div style="margin-top:6px;display:inline-block;padding:3px 8px;border-radius:5px;background:#F3EBDA;border:1px solid '+C.gold+';font-size:12.5px;font-weight:600">yearly return: '+fmtPct(c.y*100)+' of account</div>'+
      '</div></div>'+
      '<div style="margin-top:14px;border-top:1px solid '+C.line+';padding-top:10px;font-size:12.5px">'+
      row(C.gold,"Active (incl. rolling)", fmtMoney(c.active)+" → "+fmtMoney(c.premiumIncome)+"/yr")+
      row(C.blue,"Locked · shallow", fmtMoney(c.lockedS))+
      row(C.deep,"Locked · deep", fmtMoney(c.lockedD))+
      row(C.red,"Effective premium rate", fmtPct(c.rA*100,1)+" (gross "+fmtPct(c.rAGross*100,1)+")")+
      row(C.ink,"Capital rolling right now", fmtPct(c.fRoll*100,0))+
      row(C.ink,"Assignment rate / M", fmtPct(c.a*100,1)+"/mo · M "+c.M.toFixed(2))+
      (s.mode==="account"? row(C.ink,"Slots funded", c.slotsNow+" × "+fmtMoney(c.slotSize)+" · pos "+fmtPct(c.posPctNow,1)) : "")+
      '</div>';
    return out;
  }
  function sparklineHTML(p){
    var s=p.series, max=Math.max.apply(null,s.concat([1])), pts=[];
    for(var i=0;i<s.length;i++){ var x=s.length>1?(i/(s.length-1))*296+2:150; var yv=66-(s[i]/max)*58; pts.push(x+","+yv); }
    var area="2,66 "+pts.join(" ")+" 298,66";
    var line = (p.crossYear!==null && s.length>1) ? '<line x1="'+((p.crossYear/(s.length-1))*296+2)+'" y1="6" x2="'+((p.crossYear/(s.length-1))*296+2)+'" y2="66" stroke="'+C.red+'" stroke-width="1.5" stroke-dasharray="4 3"/>' : "";
    return '<svg width="100%" height="72" viewBox="0 0 300 72" preserveAspectRatio="none" role="img" aria-label="Projected account growth"><polygon points="'+area+'" fill="'+C.gold+'" opacity="0.18"/><polyline points="'+pts.join(" ")+'" fill="none" stroke="'+C.gold+'" stroke-width="2.5"/>'+line+'</svg>';
  }
  function projOutHTML(c,p){
    return sparklineHTML(p)+'<div style="margin-top:10px;font-size:12.5px">'+
      row(C.gold,"Account after "+p.years+" yr"+(p.years===1?"":"s"), fmtMoney(p.end))+
      row(C.red,"Income at that size", fmtMoney(p.endIncome)+"/yr · "+fmtMoney(p.endIncome/52)+"/wk")+
      row(C.ink,"You put in / returns added", fmtMoney(p.contributed)+" / "+fmtMoney(p.growth))+
      row(C.ink,"Stage III reached", p.crossYear===null?"not in horizon":p.crossYear===0?"at start":"year "+p.crossYear)+
      '</div>';
  }
  function ladderHTML(c){
    var stages=[
      {n:"I",name:"Sustainable",amount:c.stage1,note:"1 slot · position = "+fmtPct((c.slotSize/c.stage1)*100,1)+" of account"},
      {n:"II",name:"Two slots",amount:c.stage2,note:"single-name risk cut in half"},
      {n:"III",name:"Cap compliant",amount:c.stage3,note:"positions ≤ "+c.posCap+"% · fits ~"+c.slotsAtStage3+" slot"+(c.slotsAtStage3===1?"":"s")}
    ];
    var h='<div class="grp">STAGE LADDER · '+fmtMoney(c.perSlot)+' PER SLOT ('+(1+c.M).toFixed(1)+'×)</div>';
    for(var i=0;i<stages.length;i++){ var s=stages[i]; var col=i===2?C.red:C.ink;
      h+='<div style="display:flex;gap:12px;align-items:center;padding:9px 0;border-top:'+(i>0?"1px solid "+C.line:"none")+'">'+
        '<div style="width:30px;height:30px;border-radius:50%;flex-shrink:0;border:2px solid '+col+';display:flex;align-items:center;justify-content:center;font-family:'+ARCHIVO+';font-weight:700;font-size:13px;color:'+col+'">'+s.n+'</div>'+
        '<div style="flex:1"><div style="font-size:12.5px;font-weight:600">'+s.name+'</div><div style="font-size:10.5px;color:'+C.dim+'">'+s.note+'</div></div>'+
        '<div style="font-family:'+ARCHIVO+';font-weight:800;font-size:17px">'+fmtMoney(s.amount)+'</div></div>';
    }
    return h;
  }
  function presetsHTML(s){
    var h='<div style="display:flex;gap:8px;margin-bottom:16px" id="calc-presets">';
    var ids=["safe","realistic","aggressive"];
    for(var i=0;i<ids.length;i++){ var id=ids[i], on=s.activePreset===id;
      h+='<button onclick="WD.applyPreset(\''+id+'\')" style="flex:1;padding:9px 0;font-size:12px;font-weight:600;cursor:pointer;border-radius:6px;border:1.5px solid '+(on?C.ink:C.line)+';background:'+(on?C.ink:C.card)+';color:'+(on?"#fff":C.ink)+'">'+PRESETS[id].label+'</button>';
    }
    return h+'</div>';
  }
  function renderCalc(){
    var s=state.calc, c=calcCompute(s), p=projCompute(c,s);
    var h='<div style="font-size:10.5px;color:'+C.dim+';letter-spacing:.14em;margin-bottom:14px">TWO-COHORT RECOVERY · ROLLING MODEL</div>';
    h+=presetsHTML(s);
    // mode + target
    h+='<div class="card">'+
      '<div style="display:flex;margin-bottom:12px;border:1.5px solid '+C.ink+';border-radius:6px;overflow:hidden">'+
      '<button onclick="WD.setMode(\'income\')" style="flex:1;padding:10px 0;font-size:12px;font-weight:600;border:none;cursor:pointer;background:'+(s.mode==="income"?C.ink:"#fff")+';color:'+(s.mode==="income"?"#fff":C.ink)+'">Income → Account</button>'+
      '<button onclick="WD.setMode(\'account\')" style="flex:1;padding:10px 0;font-size:12px;font-weight:600;border:none;cursor:pointer;background:'+(s.mode==="account"?C.ink:"#fff")+';color:'+(s.mode==="account"?"#fff":C.ink)+'">Account → Income</button>'+
      '</div>'+
      '<label style="display:block"><span style="font-size:11px;color:'+C.dim+';letter-spacing:.08em">'+(s.mode==="income"?"DESIRED YEARLY INCOME":"TOTAL ACCOUNT VALUE")+'</span>'+
      '<div style="display:flex;align-items:center;gap:6px;margin-top:4px"><span style="font-size:20px;font-weight:600">$</span>'+
      '<input class="num-in" type="number" id="calc-target" value="'+(s.mode==="income"?s.targetIncome:s.accountSize)+'" min="0" step="'+(s.mode==="income"?5000:25000)+'" oninput="WD.setTarget(this.value)" style="font-size:22px;width:100%;border:none;border-bottom:2px solid '+C.ink+';background:transparent;padding:2px 0"></div></label></div>';
    // headline
    h+='<div class="card card-ink" id="calc-headline" style="padding:18px 16px">'+headlineHTML(s,c)+'</div>';
    // groups
    for(var g=0;g<GROUPS.length;g++){ var grp=GROUPS[g];
      h+='<div class="card"><div class="grp">'+grp.title+'</div>';
      for(var f=0;f<grp.fields.length;f++){ var fl=grp.fields[f]; var val=s[fl.key];
        h+='<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">'+
          '<div><div style="font-size:12.5px;font-weight:600">'+fl.label+'</div><div style="font-size:10.5px;color:'+C.dim+'">'+fl.sub+'</div></div>'+
          '<div style="display:flex;align-items:baseline;gap:3px">'+(fl.unit==="$"?'<span style="font-size:13px;font-weight:600">$</span>':'')+
          '<input class="num-in" type="number" id="f-'+fl.key+'-num" value="'+val+'" min="'+fl.min+'" max="'+fl.max+'" step="'+fl.step+'" oninput="WD.setNum(\''+fl.key+'\',this.value)" style="width:'+(fl.unit==="$"?78:58)+'px;font-size:15px;text-align:right;border:none;border-bottom:1.5px solid '+C.ink+';background:transparent;padding:1px 2px">'+
          (fl.unit!=="$"?'<span style="font-size:12px;color:'+C.dim+'">'+fl.unit+'</span>':'')+'</div></div>'+
          '<input type="range" id="f-'+fl.key+'-range" value="'+val+'" min="'+fl.min+'" max="'+fl.max+'" step="'+fl.step+'" oninput="WD.setField(\''+fl.key+'\',this.value)" aria-label="'+fl.label+'"></div>';
      }
      h+='</div>';
    }
    // projection
    h+='<div class="card card-ink"><div class="grp">GROWTH PROJECTION · PREMIUMS REINVESTED</div>'+
      '<div style="display:flex;gap:10px;margin-bottom:12px">'+
      projInput("START", "startAccount", s.startAccount, 5000, true)+
      projInput("ADD / WK", "weeklyContrib", s.weeklyContrib, 50, true)+
      projInput("YEARS", "projYears", s.projYears, 1, false)+
      '</div><div id="calc-projout">'+projOutHTML(c,p)+'</div></div>';
    // ladder
    h+='<div class="card" id="calc-ladder">'+ladderHTML(c)+'</div>';
    h+='<div style="font-size:10.5px;color:'+C.dim+';line-height:1.7;padding:0 4px">assignments = breach × (1 − rolled) · M = Σ cohort(rate × lock) · rolled capital earns thinned premium · y = (r_eff + locked income) ÷ (1 + M). Steady-state planning math, not financial advice — cluster years arrive in bursts; pad accordingly.</div>';
    document.getElementById("body").innerHTML=h;
  }
  function projInput(label,key,val,step,money){
    return '<label style="flex:1"><span style="font-size:10px;color:'+C.dim+';letter-spacing:.1em">'+label+'</span>'+
      '<div style="display:flex;align-items:baseline;gap:2px;border-bottom:1.5px solid '+C.ink+'">'+(money?'<span style="font-size:12px;font-weight:600">$</span>':'')+
      '<input class="num-in" type="number" value="'+val+'" min="0" step="'+step+'" oninput="WD.setProj(\''+key+'\',this.value)" style="width:100%;font-size:15px;border:none;background:transparent;padding:3px 0"></div></label>';
  }
  function updateCalcOutputs(){
    var s=state.calc, c=calcCompute(s), p=projCompute(c,s);
    var hd=document.getElementById("calc-headline"); if(hd) hd.innerHTML=headlineHTML(s,c);
    var po=document.getElementById("calc-projout"); if(po) po.innerHTML=projOutHTML(c,p);
    var ld=document.getElementById("calc-ladder"); if(ld) ld.innerHTML=ladderHTML(c);
  }

  // ==================================================================
  // COMPANY
  // ==================================================================
  function band(x,e){ for(var i=0;i<e.length;i++){ if(x>=e[i][0]) return e[i][1]; } return e[e.length-1][1]; }
  function scoreStrength(m){
    var checks=[];
    var ni=m.net_income, ni_ok=isN(ni)&&ni>0;
    checks.push({w:0.16, v:isN(ni)?(ni_ok?1:0):null, name:"Profitable", ok:ni_ok});
    var nm=m.net_margin;
    checks.push({w:0.12, v:!isN(nm)?null:band(nm,[[0.15,1],[0.05,0.7],[0,0.4],[-1e9,0]]), name:"Healthy margin", ok:isN(nm)&&nm>0});
    var ic=m.interest_coverage;
    checks.push({w:0.22, v:!isN(ic)?null:band(ic,[[8,1],[4,0.8],[2,0.5],[1,0.25],[-1e9,0]]), name:"Earnings cover its interest", ok:isN(ic)&&ic>=4});
    var ndf=m.net_debt_to_fcf, ndv, ndok;
    if(!isN(ndf)){ndv=null;ndok=false;} else if(ndf<=0){ndv=1;ndok=true;} else {ndv=band(ndf,[[6,0.1],[3.5,0.3],[2,0.55],[1,0.8],[-1e9,1]]);ndok=ndf<=2;}
    checks.push({w:0.25, v:ndv, name:"Debt payable from cash flow", ok:ndok});
    var fcf=m.fcf, fcf_ok=isN(fcf)&&fcf>0;
    checks.push({w:0.15, v:isN(fcf)?(fcf_ok?1:0):null, name:"Positive free cash flow", ok:fcf_ok});
    var rg=m.revenue_growing;

      '<div style="display:flex;gap:10px;margin-bottom:14px">'+
      '<label style="flex:1"><span style="'+lbl+'">OPENED</span><input class="num-in" type="date" value="'+esc(f.opened)+'" oninput="WD.setForm(\'opened\',this.value)" style="'+inS+'"></label>'+
      '<label style="flex:1"><span style="'+lbl+'">EXPIRATION</span><input class="num-in" type="date" value="'+esc(f.expiration)+'" oninput="WD.setForm(\'expiration\',this.value)" style="'+inS+'"></label></div>'+
      '<button onclick="WD.addPos()" style="width:100%;padding:11px 0;font-size:13px;font-weight:700;cursor:pointer;border-radius:8px;border:1.5px solid '+C.ink+';background:'+C.ink+';color:#fff">Add position</button></div>';
    h+='<div class="grp">OPEN POSITIONS</div>';
    if(list.length===0) h+='<div style="background:'+C.card+';border:1.5px dashed '+C.line+';border-radius:10px;padding:20px;text-align:center;font-size:12.5px;color:'+C.dim+';margin-bottom:16px">No positions yet — add one above. They save on this device.</div>';
    for(var k=0;k<list.length;k++){ var p=list[k]; var s2=positionStats(p); var soon=s2.dte<=5;
      h+='<div class="card" style="padding:13px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'+
        '<span style="font-family:'+ARCHIVO+';font-weight:800;font-size:17px">'+esc(p.ticker)+'</span>'+
        '<span style="font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;background:'+(p.type==="CSP"?"#E9EFF4":"#F3EBDA")+';color:'+(p.type==="CSP"?C.blue:C.gold)+'">'+p.type+'</span>'+
        '<span style="font-size:12px;color:'+C.dim+'">$'+num(p.strike)+(s2.isCC?' · '+s2.shares+'sh':' × '+(num(p.contracts)||1))+'</span>'+
        '<span style="flex:1"></span>'+
        '<span style="font-size:11px;font-weight:600;color:'+(soon?C.red:C.dim)+'">'+(s2.dte<0?"expired":s2.dte+"d left")+'</span>'+
        '<button onclick="WD.removePos('+k+')" style="background:none;border:none;color:'+C.dim+';cursor:pointer;font-size:16px;line-height:1;padding:0 2px" aria-label="remove">×</button></div>'+
        '<div style="font-size:12px">'+row(C.gold,"Premium collected",fmtMoney(s2.premiumCollected))+row(C.blue,(s2.isCC?"Cost basis":"Collateral"),fmtMoney(s2.collateral))+row(C.red,"Return on collateral",fmtPct(s2.roc*100,2))+row(C.ink,"Per week / per year",fmtPct(s2.weekly*100,2)+"/wk · "+fmtPct(s2.annualized*100,1)+"/yr")+'</div></div>';
    }
    h+='<div style="font-size:10.5px;color:'+C.dim+';line-height:1.7;padding:8px 4px 0">Return on collateral = premium ÷ collateral. For puts, collateral = strike × 100 × contracts; for covered calls it\'s your cost basis (avg cost × shares). Per week divides that by the weeks from open to expiration; per year scales by 365 ÷ days held. Positions persist on this device. Not financial advice.</div>';
    document.getElementById("body").innerHTML=h;
  }

  // ==================================================================
  // CONTROLLER
  // ==================================================================
  var defCalc={ mode:"income", targetIncome:100000, accountSize:1000000, activePreset:"realistic", startAccount:150000, weeklyContrib:500, projYears:10 };
  for(var k in PRESETS.realistic){ if(k!=="label") defCalc[k]=PRESETS.realistic[k]; }
  var state={
    tab:"calc",
    calc:defCalc,
    company:{ ticker:"", apiKey:store.get("be_fmp_key",""), showKey:false, res:SAMPLE, sample:true, loading:false, err:"" },
    positions:{ list:store.get("be_positions",[]), form:{ ticker:"", type:"CSP", strike:"", premium:"", contracts:"1", shares:"100", avgCost:"", opened:todayStr(), expiration:"" } }
  };

  var WD={
    setTab:function(t){ state.tab=t; renderShell(); },
    // calc
    setMode:function(m){ state.calc.mode=m; renderCalc(); },
    setTarget:function(v){ if(state.calc.mode==="income") state.calc.targetIncome=v; else state.calc.accountSize=v; updateCalcOutputs(); },
    setField:function(k,v){ state.calc[k]=v; var n=document.getElementById("f-"+k+"-num"); if(n) n.value=v; this._clearPreset(); updateCalcOutputs(); },
    setNum:function(k,v){ state.calc[k]=v; var r=document.getElementById("f-"+k+"-range"); if(r) r.value=v; this._clearPreset(); updateCalcOutputs(); },
    setProj:function(k,v){ state.calc[k]=v; updateCalcOutputs(); },
    applyPreset:function(id){ var p=PRESETS[id]; for(var k in p){ if(k!=="label") state.calc[k]=p[k]; } state.calc.activePreset=id; renderCalc(); },
    _clearPreset:function(){ if(state.calc.activePreset){ state.calc.activePreset=null; var el=document.getElementById("calc-presets"); if(el) el.outerHTML=presetsHTML(state.calc); } },
    // company
    setTicker:function(v){ state.company.ticker=v; },
    setKey:function(v){ state.company.apiKey=v; store.set("be_fmp_key",v); },
    toggleKey:function(){ state.company.showKey=!state.company.showKey; renderCompany(); },
    scan:function(){
      var s=state.company, sym=(s.ticker||"").trim().toUpperCase();
      if(!sym) return;
      var local=useProxy();
      if(!local && !(s.apiKey||"").trim()){ s.err="Add your free FMP key below to pull live data (financialmodelingprep.com — 250 calls/day, free)."; s.showKey=true; renderCompany(); return; }
      s.loading=true; s.err=""; renderCompany();
      fetchFundamentals(sym, (s.apiKey||"").trim()).then(function(r){ s.res=r; s.sample=false; s.loading=false; renderCompany(); })
        .catch(function(e){
          s.loading=false;
          var m=e.message||String(e);
          var net=(e instanceof TypeError)||/Failed to fetch|Load failed|NetworkError|ERR_/i.test(m);
          if(net && location.protocol==="file:"){ s.err="Your browser blocked the live lookup because the app is open as a local file. Open the hosted link instead (or use “Open Wheel Desk.command”). The Calculator and Positions tabs work either way."; }
          else if(net){ s.err="Couldn't reach FMP just now — your browser may be blocking the cross-site request, or FMP is momentarily down. Try again in a moment."; }
          else if(/402/.test(m)){ s.err="FMP wouldn't return "+sym+"'s statements on your current plan (HTTP 402). The free tier limits some data — this loads whatever your plan allows."; }
          else { s.err="Couldn't load "+sym+": "+m+" — usually a wrong key or the free 250/day limit."; }
          renderCompany();
        });
    },
    // positions
    setForm:function(k,v){ state.positions.form[k]=v; },
    setFormType:function(v){ state.positions.form.type=v; renderPositions(); },
    addPos:function(){
      var f=state.positions.form;
      if(!(f.ticker||"").trim()||!num(f.strike)||!f.expiration) return;
      var id=(window.crypto&&crypto.randomUUID)?crypto.randomUUID():String(Math.floor(performance.now()*1000));
      var rec={ ticker:f.ticker.trim().toUpperCase(), type:f.type, strike:f.strike, premium:f.premium, contracts:f.contracts, shares:f.shares, avgCost:f.avgCost, opened:f.opened, expiration:f.expiration, id:id };
      state.positions.list.push(rec);
      store.set("be_positions", state.positions.list);
      state.positions.form={ ticker:"", type:"CSP", strike:"", premium:"", contracts:"1", shares:"100", avgCost:"", opened:todayStr(), expiration:"" };
      renderPositions();
    },
    removePos:function(idx){ state.positions.list.splice(idx,1); store.set("be_positions", state.positions.list); renderPositions(); }
  };
  window.WD=WD;

  // ==================================================================
  // SHELL
  // ==================================================================
  var TABS=[{id:"calc",label:"Calculator"},{id:"company",label:"Company"},{id:"positions",label:"Positions"}];
  function renderShell(){
    var logo='<svg width="40" height="40" viewBox="0 0 40 40" aria-hidden="true"><circle cx="20" cy="20" r="19" fill="#fff" stroke="'+C.ink+'" stroke-width="1.5"/><circle cx="20" cy="20" r="13" fill="none" stroke="'+C.blue+'" stroke-width="3"/><circle cx="20" cy="20" r="7" fill="none" stroke="'+C.red+'" stroke-width="3"/><circle cx="20" cy="20" r="3" fill="'+C.gold+'"/></svg>';
    var tabs='<div style="display:flex;gap:6px;margin-bottom:18px;background:'+C.card+';border:1.5px solid '+C.ink+';border-radius:8px;padding:4px">';
    for(var i=0;i<TABS.length;i++){ var on=state.tab===TABS[i].id;
      tabs+='<button onclick="WD.setTab(\''+TABS[i].id+'\')" style="flex:1;padding:9px 0;font-size:12.5px;font-weight:600;cursor:pointer;border-radius:5px;border:none;background:'+(on?C.ink:"transparent")+';color:'+(on?"#fff":C.ink)+'">'+TABS[i].label+'</button>';
    }
    tabs+='</div>';
    document.getElementById("root").innerHTML=
      '<div style="max-width:480px;margin:0 auto;padding:20px 16px 48px">'+
      '<header style="display:flex;align-items:center;gap:12px;margin-bottom:16px">'+logo+
      '<h1 style="font-family:'+ARCHIVO+';font-weight:800;font-size:24px;letter-spacing:-.02em;margin:0;line-height:1">BULLS EYE <span style="color:'+C.red+'">DESK</span></h1></header>'+
      tabs+'<div id="body"></div></div>';
    if(state.tab==="calc") renderCalc();
    else if(state.tab==="company") renderCompany();
    else renderPositions();
  }

  renderShell();
})();
</script>
</body>
</html>
